name: CI
env:
  DEBUG: napi:*
  CARGO_INCREMENTAL: '1'
permissions:
  contents: write
  id-token: write
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths-ignore:
      - '**/*.md'
      - LICENSE
      - '**/*.gitignore'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - LICENSE
      - '**/*.gitignore'


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Linux native dependencies
        run: sudo apt-get update && sudo apt-get install --yes libpipewire-0.3-dev libclang-dev
      - name: Install dependencies
        run: pnpm install
      - name: Oxlint
        run: pnpm lint
      - name: Oxfmt
        run: pnpm format
      - name: TypeScript build
        run: pnpm build
      - name: Cargo fmt
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            build: pnpm build:addon --target x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc
            node: 24
          - host: windows-latest
            build: pnpm build:addon --target i686-pc-windows-msvc
            target: i686-pc-windows-msvc
            node: 22
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: pnpm build:addon --target aarch64-pc-windows-msvc
            node: 24
          - host: ubuntu-latest
            build: pnpm build:addon --target x86_64-unknown-linux-gnu
            target: x86_64-unknown-linux-gnu
            node: 24
          - host: ubuntu-24.04-arm
            build: pnpm build:addon --target aarch64-unknown-linux-gnu
            target: aarch64-unknown-linux-gnu
            node: 24
          - host: macos-15-intel
            build: pnpm build:addon --target x86_64-apple-darwin
            target: x86_64-apple-darwin
            node: 24
          - host: macos-15-arm64
            build: pnpm build:addon --target aarch64-apple-darwin
            target: aarch64-apple-darwin
            node: 24
    name: stable - ${{ matrix.settings.target }} - node@${{ matrix.settings.node }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v7
      - name: setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.settings.node }}
          cache: pnpm
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libpipewire-0.3-dev libclang-dev
      - name: Install dependencies
        run: pnpm install
      - name: Setup node x86
        uses: actions/setup-node@v6
        if: matrix.settings.target == 'i686-pc-windows-msvc'
        with:
          node-version: ${{ matrix.settings.node }}
          cache: pnpm
          architecture: x86
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: '*.node'
          if-no-files-found: error
  test-native-binding:
    name: Test bindings on ${{ matrix.settings.target }} - node@24
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            architecture: x64
          - host: macos-15-arm64
            target: aarch64-apple-darwin
            architecture: arm64
        node:
          - 24
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v7
      - name: setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          architecture: ${{ matrix.settings.architecture }}
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libpipewire-0.3-dev
      - name: Install dependencies
        run: pnpm install
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: bindings-${{ matrix.settings.target }}
          path: .
      - name: Build TypeScript wrapper
        run: pnpm build
      - name: Test native binding
        run: node ./scripts/simple-test.js
      - name: Test
        run: pnpm test
  publish:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_type == 'tag' && github.event.created)
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-native-binding
    steps:
      - uses: actions/checkout@v7
      - name: setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: create npm dirs
        run: pnpm napi create-npm-dirs
      - name: Move artifacts
        run: pnpm artifacts
      - name: List packages
        run: ls -R ./npm
        shell: bash
      - name: Publish
        run: npm publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ''